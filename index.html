<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Internship | Stage zero</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="https://kit.fontawesome.com/77b49a01e6.js" crossorigin="anonymous"></script>
</head>

<body>
    <section class="root_card_container" role="region" data-testid="test-todo-card" data-testid="test-todo-edit-form">

        <h2 class="title" data-testid="test-todo-title">Clear Dishes and Load Dishwasher</h2>
        <input class="title_input title hidden" value="Clear Dishes and Load Dishwasher"
            data-testid="test-todo-edit-title-input" />
        <div data-testid="test-todo-collapsible-section" class="description_container">
            <button data-testid="test-todo-expand-toggle">

                <i class="fa-regular fa-square-plus"></i>
            </button>
            <p class="description" data-testid="test-todo-description">Complete the task of clearing dishes and loading
                the
                dishwasher.
            </p>
        </div>
        <textarea data-testid="test-todo-edit-description-input" class="description_input description  hidden"
            placeholder="Enter task description...">Complete the task of clearing dishes and loading the dishwasher.</textarea>
        <div class="root_time_container">
            <span class="time_container">
                <span>Priority:</span>
                <span aria-label="High Priority" class="priority_badge" data-testid="test-todo-priority">
                    High
                </span>
                <select name="" id="" data-testid="test-todo-edit-priority-select" aria-label="Select task priority"
                    class="priority_select hidden">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High" selected>High</option>
                </select>
            </span>
            <span class="time_container">
                <span>Due Date:</span>
                <time datetime="2026-04-16T00:00:00" data-testid="test-todo-due-date">
                    Due Date
                </time>
                <input data-testid="test-todo-edit-due-date-input" type="date" name="" id="" class="hidden"
                    aria-label="Select due date">
            </span>
            <span class="time_container time_remaining_container">
                <span>Time Remaining:</span>
                <time datetime="" data-testid="test-todo-time-remaining" aria-live="polite">
                    Time Remaining
                </time>
                <span class="overdue hidden" data-testid="test-todo-overdue-indicator">Overdue</span>
            </span>
        </div>
        <div class="root_status_container">
            <div class="status_tags_container">
                <span class="status_container">
                    <span>Status:</span>
                    <time data-testid="test-todo-status" aria-label="Task is currently in progress">
                        In Progress
                    </time>
                    <select name="" id="" data-testid="test-todo-status-control" aria-label="Select status"
                        class="priority_select hidden">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done" selected>Done</option>
                    </select>
                </span>
                <span class="status_container">
                    <span>Tags:</span>
                    <ul role="list" data-testid="test-todo-tags">
                        <li class="tags" data-testid="test-todo-tag-home" data-testid="test-todo-tags">Home</li>
                        <li class="tags" data-testid="test-todo-tag-dishes" data-testid="test-todo-tags">Dishes</li>
                        <li class="tags" data-testid="test-todo-tag-mom" data-testid="test-todo-tags">Mom</li>
                    </ul>
                </span>
            </div>
            <span class="checkbox_container">
                <input type="checkbox" name="todo-complete" id="todo-complete" role="checkbox"
                    data-testid="test-todo-complete-toggle">
                <label for="todo-complete" data-testid="test-todo-complete-label">Mark as Complete</label>
            </span>

        </div>
        <div class="root_btn_container">
            <span>

                <button class="edit_btn" data-testid="test-todo-edit-button" aria-label="Edit">Edit</button>
                <button class="save_btn hidden" data-testid="test-todo-save-button" aria-label="Save">Save</button>
            </span>
            <span>
                <button class="delete_btn" data-testid="test-todo-delete-button" aria-label="Delete">Delete</button>
                <button class="cancel_btn hidden" data-testid="test-todo-cancel-button"
                    aria-label="Cancel">Cancel</button>
            </span>
        </div>

    </section>
    <script src="index.js"></script>
</body>

</html>
